name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [dev]

  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch, tag, or SHA). Default: dev'
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-dev
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-dev:
    name: Deploy dev to new.burcev.team
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev') || github.event_name == 'workflow_dispatch' }}
    environment: dev
    steps:
      - name: Resolve deploy ref
        id: ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ github.event.inputs.ref || 'dev' }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Resolve git sha
        id: git
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: deploy/nginx
          file: deploy/nginx/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nginx-dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nginx-dev-${{ steps.git.outputs.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          target: runner
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ steps.git.outputs.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.DEV_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=https://new.burcev.team
            NEXT_PUBLIC_APP_VERSION=${{ steps.git.outputs.sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file: apps/api/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:api-dev
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:api-dev-${{ steps.git.outputs.sha }}

      - name: Deploy via SSH
        id: deploy
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_GHCR_USERNAME: ${{ secrets.DEPLOY_GHCR_USERNAME }}
          DEPLOY_GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
          NGINX_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nginx-dev-${{ steps.git.outputs.sha }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ steps.git.outputs.sha }}
          API_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:api-dev-${{ steps.git.outputs.sha }}
        run: |
          set -euo pipefail
          DEPLOY_SSH_PORT=${DEPLOY_SSH_PORT:-22}

          if [[ -z "${DEPLOY_SSH_HOST}" || -z "${DEPLOY_SSH_USER}" || -z "${DEPLOY_SSH_PRIVATE_KEY}" || -z "${DEPLOY_PATH}" ]]; then
            echo "Missing required secrets: DEPLOY_SSH_HOST, DEPLOY_SSH_USER, DEPLOY_SSH_PRIVATE_KEY, DEPLOY_PATH" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          printf "%s\n" "${DEPLOY_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_SSH_PORT}" "${DEPLOY_SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Copy compose file to server
          scp -P "${DEPLOY_SSH_PORT}" -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            deploy/docker-compose.dev.yml "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:${DEPLOY_PATH}/"

          ssh -p "${DEPLOY_SSH_PORT}" -i ~/.ssh/id_ed25519 "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' GHCR_USERNAME='${DEPLOY_GHCR_USERNAME}' GHCR_TOKEN='${DEPLOY_GHCR_TOKEN}' \
             NGINX_IMAGE='${NGINX_IMAGE}' WEB_IMAGE='${WEB_IMAGE}' API_IMAGE='${API_IMAGE}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          if [[ -z "${GHCR_USERNAME}" || -z "${GHCR_TOKEN}" ]]; then
            echo "Missing DEPLOY_GHCR_USERNAME or DEPLOY_GHCR_TOKEN" >&2
            exit 1
          fi

          if [[ ! -f .env.dev ]]; then
            echo ".env.dev not found in $DEPLOY_PATH" >&2
            exit 1
          fi

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

          # Write compose env
          cat > .env.compose << EOF
          NGINX_IMAGE=${NGINX_IMAGE}
          WEB_IMAGE=${WEB_IMAGE}
          API_IMAGE=${API_IMAGE}
          EOF

          # Pull images
          docker compose -f docker-compose.dev.yml --env-file .env.compose pull

          # Up
          docker compose -f docker-compose.dev.yml --env-file .env.compose up -d

          # Cleanup old images
          docker image prune -f
          REMOTE

          echo "deployment_url=https://new.burcev.team" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS --max-time 10 https://new.burcev.team/ >/dev/null 2>&1; then
              echo "Web health check passed"
              break
            fi
            [[ $i -eq 30 ]] && { echo "Web health check failed" >&2; exit 1; }
            sleep 2
          done
          for i in $(seq 1 15); do
            if curl -fsS --max-time 10 https://new.burcev.team/health >/dev/null 2>&1; then
              echo "API health check passed"
              break
            fi
            [[ $i -eq 15 ]] && { echo "API health check failed" >&2; exit 1; }
            sleep 2
          done
          echo "All health checks passed"
