services:
  swap-setup:
    image: alpine:latest
    privileged: true
    volumes:
      - /:/host
    command: >
      sh -c '
        echo "=== MEMORY BEFORE ===" &&
        grep -E "MemTotal|MemFree|SwapTotal" /proc/meminfo &&
        if [ -f /host/swapfile ]; then
          echo "swapfile already exists:" &&
          ls -lh /host/swapfile &&
          swapon /host/swapfile 2>&1 && echo "swapon OK" || echo "swapon skipped (already active)"
        else
          echo "Creating 4GB swapfile..." &&
          dd if=/dev/zero of=/host/swapfile bs=1M count=4096 status=progress &&
          chmod 600 /host/swapfile &&
          mkswap /host/swapfile &&
          swapon /host/swapfile &&
          echo "=== SWAP ACTIVE ==="
        fi &&
        grep -vq "/swapfile" /host/etc/fstab && echo "/swapfile none swap sw 0 0" >> /host/etc/fstab && echo "fstab updated" || echo "fstab already has swapfile" &&
        echo "=== MEMORY AFTER ===" &&
        grep -E "MemTotal|MemFree|SwapTotal|SwapFree" /proc/meminfo &&
        cat /proc/swaps &&
        sleep 86400
      '
    restart: unless-stopped
