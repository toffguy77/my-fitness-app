# Dev deployment: new.burcev.team
# Uses pre-built images from GHCR. Image tags are passed via env.
# Requires: .env.dev on server (DB, JWT, etc.), SSL certs at /etc/letsencrypt

services:
  nginx:
    image: ${NGINX_IMAGE}
    container_name: burcev-nginx-dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - burcev_shared
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE}
    container_name: burcev-dev
    env_file:
      - .env.dev
    environment:
      - PORT=3069
      - NODE_ENV=production
    networks:
      - burcev_shared
    restart: unless-stopped

  api:
    image: ${API_IMAGE}
    container_name: burcev-api-dev
    env_file:
      - .env.dev
    environment:
      - PORT=4000
      - NODE_ENV=production
    networks:
      - burcev_shared
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  burcev_shared:
    driver: bridge
