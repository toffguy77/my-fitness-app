# Dev stand: new.burcev.team
# Next.js frontend -> 127.0.0.1:3071
# Go API           -> 127.0.0.1:4071

server {
    listen 80;
    server_name new.burcev.team;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name new.burcev.team;

    ssl_certificate /etc/letsencrypt/live/new.burcev.team/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.burcev.team/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    # Go API: /api/v1/* and /health
    location /api/v1/ {
        proxy_pass http://127.0.0.1:4071;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:4071;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js frontend: everything else
    location / {
        proxy_pass http://127.0.0.1:3071;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
